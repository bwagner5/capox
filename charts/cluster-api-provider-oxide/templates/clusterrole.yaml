apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cluster-api-provider-oxide.name" . }}
  labels:
    {{- include "cluster-api-provider-oxide.labels" . | nindent 4 }}
rules:
# Cluster-wide on purpose. The controller reads Oxide credential Secrets
# (OxideCluster.spec.credentialsRef) and bootstrap data Secrets, which can live
# in any namespace where a workload cluster is defined. The cached client backs
# these reads with a list/watch, so namespace- or name-scoped RBAC can't narrow
# it. This matches CAPA/CAPZ/CAPV. 
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cluster.x-k8s.io
  resources:
  - clusters
  - machines
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - oxideclusters
  - oxidemachines
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - oxideclusters/finalizers
  - oxidemachines/finalizers
  verbs:
  - update
- apiGroups:
  - infrastructure.cluster.x-k8s.io
  resources:
  - oxideclusters/status
  - oxidemachines/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cluster-api-provider-oxide.name" . }}
  labels:
    {{- include "cluster-api-provider-oxide.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cluster-api-provider-oxide.name" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "cluster-api-provider-oxide.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
