name: Build CAPI image for Oxide

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout image-builder
        uses: actions/checkout@v7
        with:
          repository: kubernetes-sigs/image-builder

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf xorriso
          export PIP_BREAK_SYSTEM_PACKAGES=1
          export PATH="/$PWD/.local/bin:$PATH"
          make deps-qemu

      - name: Build image
        working-directory: images/capi
        env:
          PACKER_FLAGS: >-
            --var 'format=raw'
            --var 'disk_size=8192'
            --var 'firmware=/usr/share/ovmf/OVMF.fd'
        run: |
          make build-qemu-ubuntu-2404-cloudimg

      - name: Compress and checksum
        working-directory: images/capi
        run: |
          RAW=$(find output -name '*.raw' -o -name 'ubuntu-*' -type f | head -1)
          # if format=raw the artifact may not carry a .raw extension; verify:
          qemu-img info "$RAW"
          zstd -19 -T0 "$RAW" -o oxide-capi-ubuntu-2404.raw.zst
          sha256sum oxide-capi-ubuntu-2404.raw.zst > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: capi-${{ github.run_id }}
          files: |
            images/capi/oxide-capi-ubuntu-2404.raw.zst
            images/capi/SHA256SUMS