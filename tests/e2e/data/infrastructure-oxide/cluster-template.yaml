---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: "${CLUSTER_NAME}"
  namespace: "${NAMESPACE}"
  labels:
    cni: calico
    ccm: oxide
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["192.168.0.0/16"]
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: OxideCluster
    name: "${CLUSTER_NAME}"
  controlPlaneRef:
    apiGroup: controlplane.cluster.x-k8s.io
    kind: KubeadmControlPlane
    name: "${CLUSTER_NAME}-control-plane"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: OxideCluster
metadata:
  name: "${CLUSTER_NAME}"
  namespace: "${NAMESPACE}"
spec:
  credentialsRef:
    name: oxide-credentials
    namespace: "${NAMESPACE}"
  project: "${OXIDE_PROJECT}"
  vpc: "${OXIDE_VPC}"
  subnet: "${OXIDE_SUBNET}"
  ipPool: "${OXIDE_IP_POOL}"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: OxideMachineTemplate
metadata:
  name: "${CLUSTER_NAME}-control-plane"
  namespace: "${NAMESPACE}"
spec:
  template:
    spec:
      nCPUs: 2
      memory: 4Gi
      diskSize: 20Gi
      imageID: "${OXIDE_IMAGE_ID}"
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: KubeadmControlPlane
metadata:
  name: "${CLUSTER_NAME}-control-plane"
  namespace: "${NAMESPACE}"
spec:
  replicas: ${CONTROL_PLANE_MACHINE_COUNT}
  version: "${KUBERNETES_VERSION}"
  machineTemplate:
    spec:
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: OxideMachineTemplate
        name: "${CLUSTER_NAME}-control-plane"
  kubeadmConfigSpec:
    initConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          - name: cloud-provider
            value: external
    joinConfiguration:
      nodeRegistration:
        kubeletExtraArgs:
          - name: cloud-provider
            value: external
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: OxideMachineTemplate
metadata:
  name: "${CLUSTER_NAME}"
  namespace: "${NAMESPACE}"
spec:
  template:
    spec:
      nCPUs: 2
      memory: 4Gi
      diskSize: 20Gi
      imageID: "${OXIDE_IMAGE_ID}"
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
kind: KubeadmConfigTemplate
metadata:
  name: "${CLUSTER_NAME}"
  namespace: "${NAMESPACE}"
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          kubeletExtraArgs:
            - name: cloud-provider
              value: external
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: MachineDeployment
metadata:
  name: "${CLUSTER_NAME}"
  namespace: "${NAMESPACE}"
spec:
  clusterName: "${CLUSTER_NAME}"
  replicas: ${WORKER_MACHINE_COUNT}
  selector:
    matchLabels: {}
  template:
    spec:
      clusterName: "${CLUSTER_NAME}"
      version: "${KUBERNETES_VERSION}"
      bootstrap:
        configRef:
          apiGroup: bootstrap.cluster.x-k8s.io
          kind: KubeadmConfigTemplate
          name: "${CLUSTER_NAME}"
      infrastructureRef:
        apiGroup: infrastructure.cluster.x-k8s.io
        kind: OxideMachineTemplate
        name: "${CLUSTER_NAME}"
---
apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: "${CLUSTER_NAME}-cni-calico"
  namespace: "${NAMESPACE}"
spec:
  strategy: ApplyOnce
  clusterSelector:
    matchLabels:
      cni: calico
  resources:
    - name: "${CLUSTER_NAME}-cni-calico"
      kind: ConfigMap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "${CLUSTER_NAME}-cni-calico"
  namespace: "${NAMESPACE}"
data: ${CNI_RESOURCES}
---
apiVersion: addons.cluster.x-k8s.io/v1beta2
kind: ClusterResourceSet
metadata:
  name: "${CLUSTER_NAME}-ccm"
  namespace: "${NAMESPACE}"
spec:
  strategy: ApplyOnce
  clusterSelector:
    matchLabels:
      ccm: oxide
  resources:
    - name: "${CLUSTER_NAME}-ccm"
      kind: ConfigMap
    - name: "${CLUSTER_NAME}-ccm-secret"
      kind: ConfigMap
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "${CLUSTER_NAME}-ccm"
  namespace: "${NAMESPACE}"
data: ${CCM_RESOURCES}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: "${CLUSTER_NAME}-ccm-secret"
  namespace: "${NAMESPACE}"
data: ${CCM_SECRET_RESOURCES}
